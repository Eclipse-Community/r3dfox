<!-- r3dfox panel -->

<script src="chrome://browser/content/preferences/r3dfox.js"/>

<!-- r3dfox -->
<html:template id="template-paneR3dfox">
<hbox id="r3dfoxcategory"
      class="subcategory"
      hidden="true"
      data-category="paneR3dfox">
  <html:h1 data-l10n-id="r3dfox-title"/>
</hbox>

<!-- r3dfox visual -->
<groupbox id="r3dfoxVisualGroup"
          data-category="paneR3dfox"
          hidden="true">
  <label><html:h2 data-l10n-id="r3dfox-visual-header"/></label>

  <hbox align="center">
    <checkbox id="r3dfoxUseNativeStyles"
              data-l10n-id="r3dfox-native-checkbox"
              preference="widget.non-native-theme.enabled"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-native-checkbox-desc"/>

  <hbox align="center">
    <label id="r3dfoxNativeMenulist" data-l10n-id="r3dfox-native-menulist" control="r3dfoxNativeMenulistType"/>
    <menulist id="r3dfoxNativeMenulistType" preference="browser.display.windows.non_native_menus">
      <menupopup>
        <menuitem label="Native menulists always" value="0"/>
        <menuitem label="Custom menulists always" value="1"/>
        <menuitem label="Native menulists unless Windows 10 (Modern) theme is used (Default)" value="2"/>
      </menupopup>
    </menulist>
  </hbox>

  <hbox align="center">
    <label id="r3dfoxNativeScroll" data-l10n-id="r3dfox-native-scroll" control="r3dfoxNativeScrollType"/>
    <menulist id="r3dfoxNativeScrollType" preference="widget.native-controls.scrollbar-style">
      <menupopup>
        <menuitem label="Native scrollbars always" value="0"/>
        <menuitem label="Custom scrollbars always" value="1"/>
        <menuitem label="Native scrollbars unless the website has a dark color scheme (Default)" value="2"/>
      </menupopup>
    </menulist>
  </hbox>

  <hbox align="center">
    <label id="r3dfoxFakeScroll" data-l10n-id="r3dfox-fake-scroll-type" control="r3dfoxFakeScrollType"/>
    <menulist id="r3dfoxFakeScrollType" preference="widget.non-native-theme.scrollbar.style">
      <menupopup>
        <menuitem label="Default platform scrollbar style (Default)" value="0"/>
        <menuitem label="macOS scrollbar (small)" value="1"/>
        <menuitem label="GTK scrollbar (smaller)" value="2"/>
        <menuitem label="Android scrollbar (smallest)" value="3"/>
        <menuitem label="Windows 10 scrollbar (normal)" value="4"/>
        <menuitem label="Windows 11 scrollbar (smaller)" value="5"/>
      </menupopup>
    </menulist>
  </hbox>

  <hbox align="center">
    <label id="r3dfoxWinTheme" data-l10n-id="r3dfox-win-theme-type" control="r3dfoxWinThemeType"/>
    <menulist id="r3dfoxWinThemeType" preference="widget.native-controls.override-win-version">
      <menupopup>
        <menuitem label="Current OS version (Default)" value="0"/>
        <menuitem label="Windows XP" value="5"/>
        <menuitem label="Windows Vista" value="6"/>
        <menuitem label="Windows 7" value="7"/>
        <menuitem label="Windows 8" value="8"/>
        <menuitem label="Windows 10 (Modern)" value="10"/>
      </menupopup>
    </menulist>
  </hbox>

  <hbox align="center">
    <label id="r3dfoxColors" data-l10n-id="r3dfox-colors" control="r3dfoxColorsType"/>
    <menulist id="r3dfoxColorsType" preference="r3dfox.colors">
      <menupopup>
        <menuitem label="Disabled (Stock Firefox Blue)" value="0"/>
        <menuitem label="r3dfox r3d" value="1"/>
        <menuitem label="r3dfox ESR Orange" value="2"/>
        <menuitem label="Plasmafox Pink" value="3"/>
        <menuitem label="Eclipse Purple" value="4"/>
      </menupopup>
    </menulist>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxTheme"
              data-l10n-id="r3dfox-theme"
              preference="r3dfox.customizations.enabled"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxdrag"
              data-l10n-id="r3dfox-drag"
              preference="r3dfox.drag-space.enabled"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxBackgrounds"
              data-l10n-id="r3dfox-backgrounds"
              preference="r3dfox.backgrounds.enabled"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxMenubar"
              data-l10n-id="r3dfox-menubar"
              preference="r3dfox.transparent.menubar"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxNavbar"
              data-l10n-id="r3dfox-navbar"
              preference="r3dfox.translucent.navbar"/>
  </hbox>

  <hbox align="center">
    <label id="r3dfoxFog" data-l10n-id="r3dfox-fog-type" control="r3dfoxFogType"/>
    <menulist id="r3dfoxFogType" preference="r3dfox.aero.fog">
      <menupopup>
        <menuitem label="Disabled (Default with backgrounds enabled)" value="0"/>
        <menuitem label="r3dfox style (covers menubar)" value="1"/>
        <menuitem label="Stock Firefox style" value="2"/>
      </menupopup>
    </menulist>
  </hbox>

  <hbox align="center">
    <label id="r3dfoxCaptionText" data-l10n-id="r3dfox-caption-text" control="r3dfoxCaptionTextType"/>
    <menulist id="r3dfoxCaptionTextType" preference="r3dfox.caption.text.color">
      <menupopup>
        <menuitem label="Default platform style (Default)" value="0"/>
        <menuitem label="White" value="1"/>
        <menuitem label="Black" value="2"/>
      </menupopup>
    </menulist>
  </hbox>
</groupbox>

<!-- r3dfox functional -->
<groupbox id="r3dfoxFunctionalGroup"
          data-category="paneR3dfox"
          hidden="true">
  <label><html:h2 data-l10n-id="r3dfox-functional-header"/></label>

  <hbox align="center">
    <checkbox id="r3dfoxoneoffs"
              data-l10n-id="r3dfox-one-offs"
              preference="browser.urlbar.oneOffsInstant"/>
  </hbox>

<!--  <hbox align="center">
    <checkbox id="r3dfoxoldoneoffs"
              data-l10n-id="r3dfox-old-one-offs"
              preference="browser.urlbar.scotchBonnet.enableOverride"/>
  </hbox> -->

  <hbox align="center">
    <checkbox id="r3dfoxviewimage"
              data-l10n-id="r3dfox-view-image"
              preference="r3dfox.view.image"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxnavtext"
              data-l10n-id="r3dfox-nav-text"
              preference="browser.menu.navigationIcons"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxurlbarformatting"
              data-l10n-id="r3dfox-urlbar-formatting"
              preference="browser.urlbar.formatting.enabled"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxtabgroups"
              data-l10n-id="r3dfox-tab-groups"
              preference="browser.tabs.groups.enabled"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxscreenshotcomponent"
              data-l10n-id="r3dfox-screenshot-component"
              preference="screenshots.browser.component.enabled"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxhoverpreview"
              data-l10n-id="r3dfox-hover-preview"
              preference="browser.tabs.hoverPreview.enabled"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxdroptopin"
              data-l10n-id="r3dfox-drop-to-pin"
              preference="browser.tabs.dropToPin.enabled"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxtaskbartabs"
              data-l10n-id="r3dfox-taskbar-tabs"
              preference="browser.taskbarTabs.enabled"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxaboutconfig"
              data-l10n-id="r3dfox-old-aboutconfig"
              preference="r3dfox.ui.oldaboutconfig"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxgeo"
              data-l10n-id="r3dfox-geo"
              preference="geo.enabled"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxswitchtotab"
              data-l10n-id="r3dfox-switch-to-tab"
              preference="browser.urlbar.secondaryActions.switchToTab"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-switch-to-tab-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxPromptTabModal"
              data-l10n-id="r3dfox-prompt-tab-modal"
              preference="prompts.tab_modal.enabled"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-prompt-tab-modal-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxPromptHeaderIcon"
              data-l10n-id="r3dfox-prompt-header-icon"
              preference="prompts.headerAppIcon.enabled"/>
  </hbox>

  <hbox align="center">
    <checkbox id="r3dfoxPromptSound"
              data-l10n-id="r3dfox-prompt-sound"
              preference="prompts.tab_modal.sound.enabled"/>
  </hbox>
</groupbox>

<!-- r3dfox advanced -->
<groupbox id="r3dfoxAdvancedGroup"
          data-category="paneR3dfox"
          hidden="true">
  <label><html:h2 data-l10n-id="r3dfox-advanced-header"/></label>

  <hbox align="center">
    <checkbox id="r3dfoxunloadram"
              data-l10n-id="r3dfox-unload-ram"
              preference="browser.tabs.unloadOnLowMemory"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-unload-ram-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxunloadforeground"
              data-l10n-id="r3dfox-unload-foreground"
              preference="browser.tabs.unloadActiveForegroundTab"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-unload-foreground-desc"/>

  <hbox align="center">
    <label id="r3dfoxUnloadThreshold" data-l10n-id="r3dfox-unload-threshold" control="r3dfoxUnloadThresholdType"/>
    <menulist id="r3dfoxUnloadThresholdType" preference="browser.low_physical_memory_threshold_mb">
      <menupopup>
        <menuitem label="4GB (4096MB)" value="4096"/>
        <menuitem label="3GB (3072MB)" value="3072"/>
        <menuitem label="2.5GB (2560MB)" value="2560"/>
        <menuitem label="2GB (2048MB)" value="2048"/>
        <menuitem label="1.75GB (1792MB)" value="1792"/>
        <menuitem label="1.5GB (1536MB)" value="1536"/>
        <menuitem label="1.25GB (1280MB)" value="1280"/>
        <menuitem label="1GB (1024MB)" value="1024"/>
        <menuitem label="0.75GB (768MB)" value="768"/>
        <menuitem label="0.5GB (512MB)" value="512"/>
        <menuitem label="0.375GB (384MB)" value="384"/>
        <menuitem label="0.25GB (256MB)" value="256"/>
      </menupopup>
    </menulist>
  </hbox>
  <description id="r3dfoxUnloadThresholdDescription" class="tip-caption" data-l10n-id="r3dfox-unload-threshold-desc"/>

  <hbox align="center">
    <label id="r3dfoxUnloadPoll" data-l10n-id="r3dfox-unload-poll" control="r3dfoxUnloadPollType"/>
    <menulist id="r3dfoxUnloadPollType" preference="browser.memory_poll_interval_ms">
      <menupopup>
        <menuitem label="5.00s (5000ms)" value="5000"/>
        <menuitem label="4.00s (4000ms)" value="4000"/>
        <menuitem label="3.50s (3500ms)" value="3500"/>
        <menuitem label="3.00s (3000ms)" value="3000"/>
        <menuitem label="2.50s (2500ms)" value="2500"/>
        <menuitem label="2.00s (2000ms)" value="2000"/>
        <menuitem label="1.75s (1750ms)" value="1750"/>
        <menuitem label="1.50s (1500ms)" value="1500"/>
        <menuitem label="1.25s (1250ms)" value="1250"/>
        <menuitem label="1.00s (1000ms)" value="1000"/>
        <menuitem label="0.875s (875ms)" value="875"/>
        <menuitem label="0.750s (750ms)" value="750"/>
        <menuitem label="0.625s (625ms)" value="625"/>
        <menuitem label="0.500s (500ms)" value="500"/>
        <menuitem label="0.375s (375ms)" value="375"/>
        <menuitem label="0.250s (250ms)" value="250"/>
      </menupopup>
    </menulist>
  </hbox>
  <description id="r3dfoxUnloadPollDescription" class="tip-caption" data-l10n-id="r3dfox-unload-poll-desc"/>

  <hbox align="center">
    <label id="r3dfoxAccessibility" data-l10n-id="r3dfox-accessibility" control="r3dfoxAccessibilityType"/>
    <menulist id="r3dfoxAccessibilityType" preference="accessibility.force_disabled">
      <menupopup>
        <menuitem label="Always disabled (1)" value="1"/>
        <menuitem label="Default (0)" value="0"/>
        <menuitem label="Always enabled (-1)" value="-1"/>
      </menupopup>
    </menulist>
  </hbox>
  <description id="r3dfoxAccessibilityDescription" class="tip-caption" data-l10n-id="r3dfox-accessibility-desc"/>

  <hbox align="center">
    <label id="r3dfoxSandboxLevel" data-l10n-id="r3dfox-sandbox-level" control="r3dfoxSandboxLevelType"/>
    <menulist id="r3dfoxSandboxLevelType" preference="security.sandbox.content.level">
      <menupopup>
        <menuitem label="Increased (20)" value="20"/>
        <menuitem label="Default (9)" value="9"/>
        <menuitem label="Lower (7)" value="7"/>
      </menupopup>
    </menulist>
  </hbox>
  <description id="r3dfoxSandboxLevelDescription" class="tip-caption" data-l10n-id="r3dfox-sandbox-level-desc"/>

  <hbox align="center">
    <label id="r3dfoxCaptionWidth" data-l10n-id="r3dfox-caption-width" control="r3dfoxCaptionWidthType"/>
    <html:input id="r3dfoxCaptionWidthType" type="number" class="option" data-type="int" preference="widget.native-controls.override-aero-caption-buttons-mask-width"/>
  </hbox>
  <description id="r3dfoxCaptionWidthDescription" class="tip-caption" data-l10n-id="r3dfox-caption-desc"/>

  <hbox align="center">
    <label id="r3dfoxCaptionHeight" data-l10n-id="r3dfox-caption-height" control="r3dfoxCaptionWidthType"/>
    <html:input id="r3dfoxCaptionHeightType" type="number" class="option" data-type="int" preference="widget.native-controls.override-aero-caption-buttons-mask-height"/>
  </hbox>
  <description id="r3dfoxCaptionHeighteDescription" class="tip-caption" data-l10n-id="r3dfox-caption-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxwebaudio"
              data-l10n-id="r3dfox-webaudio"
              preference="dom.webaudio.enabled"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-webaudio-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxcsp"
              data-l10n-id="r3dfox-csp"
              preference="security.csp.enable"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-csp-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxcorsbase"
              data-l10n-id="r3dfox-cors-base"
              preference="content.cors.disable"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-cors-base-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxcorspreflight"
              data-l10n-id="r3dfox-cors-preflight"
              preference="content.cors.bypass_preflight_request"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-cors-preflight-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxhsts"
              data-l10n-id="r3dfox-hsts"
              preference="network.stricttransportsecurity.enabled"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-hsts-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxsameorigin"
              data-l10n-id="r3dfox-same-origin"
              preference="security.same_origin_policy.enabled"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-same-origin-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxportblocking"
              data-l10n-id="r3dfox-port-blocking"
              preference="security.port.blocking.enabled"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-port-blocking-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxe10s"
              data-l10n-id="r3dfox-e10s"
              preference="browser.e10s.disabled"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-e10s-desc"/>

  <hbox align="center">
    <checkbox id="r3dfoxdwrite"
              data-l10n-id="r3dfox-dwrite"
              preference="gfx.dwrite.enabled"/>
  </hbox>
  <description class="indent tip-caption" data-l10n-id="r3dfox-dwrite-desc"/>
</groupbox>
</html:template>
