schema: 1

bugzilla:
  product: Toolkit
  component: "General"

origin:
  name: brotli
  description: generic-purpose lossless compression algorithm

  url: https://github.com/google/brotli

  release: 028fb5a23661f123017c060daa546b55cf4bde29 (2025-10-27T13:07:48Z).
  revision: 028fb5a23661f123017c060daa546b55cf4bde29

  license: MIT

vendoring:
  url: https://github.com/google/brotli
  source-hosting: github
  tracking: commit

  exclude:
    - ".*"
    - "*"
    - docs
    - go
    - python
    - scripts
    - tests

  include:
    - c/include/
    - c/common/
    - c/dec/
    - c/enc
    - c/tools

  keep:
    - LICENSE

  update-actions:
    - action: move-dir
      from: '{vendor_dir}/c/include'
      to: '{vendor_dir}/include'
    - action: move-dir
      from: '{vendor_dir}/c/common'
      to: '{vendor_dir}/common'
    - action: move-dir
      from: '{vendor_dir}/c/dec'
      to: '{vendor_dir}/dec'
    - action: move-dir
      from: '{vendor_dir}/c/enc'
      to: '{vendor_dir}/enc'
    - action: move-dir
      from: '{vendor_dir}/c/tools'
      to: '{vendor_dir}/tools'
    - action: delete-path
      path: '{vendor_dir}/c'
